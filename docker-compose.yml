version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: postport-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: postport
      POSTGRES_USER: postport
      POSTGRES_PASSWORD: postport
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postport -d postport" ]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: postport-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: [ "redis-server", "--appendonly", "yes" ]
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: postport-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    ports:
      - "9000:9000"
      - "9001:9001"
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

  minio-init:
    image: minio/mc:latest
    container_name: postport-minio-init
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      sleep 4;
      /usr/bin/mc alias set local http://minio:9000 minio minio123;
      /usr/bin/mc mb -p local/postport-media || true;
      /usr/bin/mc anonymous set download local/postport-media || true;
      exit 0;
      "

volumes:
  postgres_data:
  redis_data:
  minio_data:
